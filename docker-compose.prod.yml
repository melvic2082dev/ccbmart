# Self-hosted production deployment (alternative to Railway+Vercel).
# Primary production runs on Railway (backend) + Vercel (frontend).
# Use this compose file only for on-prem or single-VPS deployment.
version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ccbmart}
      POSTGRES_USER: ${POSTGRES_USER:-ccbmart}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ccbmart}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - ccbmart-net

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - ccbmart-net

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=8080
      - DATABASE_URL=postgresql://${POSTGRES_USER:-ccbmart}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ccbmart}?connection_limit=20&pool_timeout=10
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - STORAGE_TYPE=${STORAGE_TYPE:-local}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_REGION=${S3_REGION:-ap-southeast-1}
      - MOMO_PARTNER_CODE=${MOMO_PARTNER_CODE:-}
      - MOMO_ACCESS_KEY=${MOMO_ACCESS_KEY:-}
      - MOMO_SECRET_KEY=${MOMO_SECRET_KEY:-}
      - ZALOPAY_APP_ID=${ZALOPAY_APP_ID:-}
      - ZALOPAY_KEY1=${ZALOPAY_KEY1:-}
      - ZALOPAY_KEY2=${ZALOPAY_KEY2:-}
      - KIOTVIET_CLIENT_ID=${KIOTVIET_CLIENT_ID:-}
      - KIOTVIET_CLIENT_SECRET=${KIOTVIET_CLIENT_SECRET:-}
      - KIOTVIET_RETAILER=${KIOTVIET_RETAILER:-}
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always
    networks:
      - ccbmart-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    depends_on:
      - api
    restart: always
    networks:
      - ccbmart-net

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - api
    restart: always
    networks:
      - ccbmart-net

networks:
  ccbmart-net:
    driver: bridge

volumes:
  pgdata:
  redis-data:
  uploads:
  logs:
