# Local development compose stack.
# Primary production runs on Railway+Vercel — see docker-compose.prod.yml for self-hosted.


services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ccbmart
      POSTGRES_USER: ccbmart
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - DATABASE_URL=postgresql://ccbmart:${POSTGRES_PASSWORD}@postgres:5432/ccbmart?connection_limit=20&pool_timeout=10
      - ALLOWED_ORIGINS=http://localhost:3000
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    depends_on:
      - api
    restart: unless-stopped

volumes:
  redis-data:
  pgdata:
