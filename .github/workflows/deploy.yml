name: Deploy

# Two triggers:
#  1. Auto: push to staging branch → staging deploy
#  2. Manual: workflow_dispatch → choose staging or production
#
# Required GitHub secrets (Settings → Secrets → Actions):
#   RAILWAY_TOKEN_STAGING, RAILWAY_TOKEN_PROD
#   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
# Secrets may be absent — each step no-ops with a warning if so.

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
  push:
    branches: [staging]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Resolve target: manual = input, push = always staging
      - id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "target=${{ inputs.target }}" >> "$GITHUB_OUTPUT"
          else
            echo "target=staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Guard — verify CI has passed for this commit
        uses: actions/github-script@v7
        with:
          script: |
            const { data: runs } = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head_sha: context.sha,
              status: 'success',
            });
            const ciPassed = runs.workflow_runs.some(r => r.name === 'CI');
            if (!ciPassed) {
              core.setFailed(`No successful CI run found for ${context.sha}`);
            }

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Railway
        env:
          RAILWAY_TOKEN: ${{ steps.resolve.outputs.target == 'production' && secrets.RAILWAY_TOKEN_PROD || secrets.RAILWAY_TOKEN_STAGING }}
          TARGET: ${{ steps.resolve.outputs.target }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::warning::RAILWAY_TOKEN for $TARGET not set — skipping Railway deploy"
            exit 0
          fi
          railway redeploy --service ccbmart --yes

      - name: Deploy Vercel (production only)
        if: steps.resolve.outputs.target == 'production'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::warning::VERCEL_TOKEN not set — skipping Vercel deploy"
            exit 0
          fi
          npm install -g vercel
          vercel --prod --yes --token "$VERCEL_TOKEN" --scope "${{ secrets.VERCEL_ORG_ID }}"

      - name: Smoke test — production
        if: steps.resolve.outputs.target == 'production'
        run: |
          sleep 30
          curl -fsS https://api.ccb.x-wise.io/api/ping
          curl -fsS -o /dev/null https://ccb.x-wise.io/

      - name: Smoke test — staging
        if: steps.resolve.outputs.target == 'staging'
        env:
          STAGING_API_URL: ${{ vars.STAGING_API_URL }}
          STAGING_FE_URL: ${{ vars.STAGING_FE_URL }}
        run: |
          if [ -z "$STAGING_API_URL" ]; then
            echo "::notice::STAGING_API_URL not set — skipping staging smoke test"
            exit 0
          fi
          sleep 30
          curl -fsS "$STAGING_API_URL/api/ping"
