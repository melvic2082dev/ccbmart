name: Deploy

# Triggers:
#  1. Auto: CI workflow completes successfully on staging branch → staging deploy
#  2. Manual: workflow_dispatch → choose staging or production
#
# Required GitHub secrets:
#   RAILWAY_TOKEN_STAGING, RAILWAY_TOKEN_PROD,
#   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
# Repo variables (for smoke test):
#   STAGING_API_URL, STAGING_FE_URL

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [staging]

jobs:
  deploy:
    # Gate: manual dispatch OR CI succeeded on staging branch
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "target=${{ inputs.target }}" >> "$GITHUB_OUTPUT"
          else
            echo "target=staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Railway CLI
        # Only needed when manually deploying production — staging auto-deploys via Railway's git integration.
        if: github.event_name == 'workflow_dispatch'
        run: npm install -g @railway/cli

      - name: Deploy Railway (manual dispatch only)
        if: github.event_name == 'workflow_dispatch'
        env:
          RAILWAY_TOKEN: ${{ steps.resolve.outputs.target == 'production' && secrets.RAILWAY_TOKEN_PROD || secrets.RAILWAY_TOKEN_STAGING }}
          TARGET: ${{ steps.resolve.outputs.target }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::warning::RAILWAY_TOKEN for $TARGET not set — skipping Railway deploy"
            exit 0
          fi
          # Retry a few times in case Railway is already building
          for i in 1 2 3; do
            if railway redeploy --service ccbmart --yes; then break; fi
            echo "Redeploy attempt $i failed, waiting 30s..."
            sleep 30
          done

      - name: Wait for Railway auto-deploy (staging push)
        if: github.event_name == 'workflow_run'
        run: |
          echo "Railway auto-deploys on git push. Waiting 120s for build..."
          sleep 120

      - name: Deploy Vercel (production only)
        if: steps.resolve.outputs.target == 'production'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::warning::VERCEL_TOKEN not set — skipping Vercel deploy"
            exit 0
          fi
          npm install -g vercel
          vercel --prod --yes --token "$VERCEL_TOKEN" --scope "${{ secrets.VERCEL_ORG_ID }}"

      - name: Smoke test — production
        if: steps.resolve.outputs.target == 'production'
        run: |
          sleep 30
          curl -fsS https://api.ccb.x-wise.io/api/ping
          curl -fsS -o /dev/null https://ccb.x-wise.io/

      - name: Smoke test — staging
        if: steps.resolve.outputs.target == 'staging'
        env:
          STAGING_API_URL: ${{ vars.STAGING_API_URL }}
        run: |
          if [ -z "$STAGING_API_URL" ]; then
            echo "::notice::STAGING_API_URL not set — skipping staging smoke test"
            exit 0
          fi
          sleep 60
          curl -fsS "$STAGING_API_URL/api/ping"
