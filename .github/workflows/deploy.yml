name: Deploy (manual)

# Manual-trigger template for staged deploy.
# NOT connected to push triggers yet — activated in P1 (staging env setup).
# Required secrets (set in GitHub → Settings → Secrets → Actions):
#   RAILWAY_TOKEN_STAGING, RAILWAY_TOKEN_PROD
#   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.target }}
    steps:
      - uses: actions/checkout@v4

      - name: Guard — verify ci.yml has passed for this commit
        uses: actions/github-script@v7
        with:
          script: |
            const { data: runs } = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head_sha: context.sha,
              status: 'success',
            });
            const ciPassed = runs.workflow_runs.some(r => r.name === 'CI');
            if (!ciPassed) {
              core.setFailed(`No successful CI run found for ${context.sha}`);
            }

      # Railway deploy (staging or prod depending on input)
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Railway
        env:
          RAILWAY_TOKEN: ${{ inputs.target == 'production' && secrets.RAILWAY_TOKEN_PROD || secrets.RAILWAY_TOKEN_STAGING }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::warning::RAILWAY_TOKEN for ${{ inputs.target }} not set — skipping Railway deploy"
            exit 0
          fi
          railway redeploy --service ccbmart --yes

      # Vercel deploy (production tag only)
      - name: Deploy Vercel (production only)
        if: inputs.target == 'production'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::warning::VERCEL_TOKEN not set — skipping Vercel deploy"
            exit 0
          fi
          npm install -g vercel
          vercel --prod --yes --token "$VERCEL_TOKEN" --scope ${{ secrets.VERCEL_ORG_ID }}

      - name: Smoke test
        if: inputs.target == 'production'
        run: |
          sleep 30
          curl -fsS https://api.ccb.x-wise.io/api/ping
          curl -fsS -o /dev/null https://ccb.x-wise.io/
